trigger:
- main

pool:
  name: Default

stages:
- stage: TerraformLifecycle
  displayName: Terraform Lifecycle

  jobs:
  - job: TerraformJob
    displayName: Terraform Install Init Validate

    steps:

    # Install unzip
    - script: |
        sudo apt update
        sudo apt install unzip -y
      displayName: Install unzip

    # Install Terraform
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.6.6'

    # Verify Terraform
    - script: |
        terraform --version
      displayName: Verify Terraform

    # Terraform Init
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        backendServiceArm: 'serviceconnection-may'
        backendAzureRmStorageAccountName: 'satishstorage1122'
        backendAzureRmContainerName: 'containersatish'
        backendAzureRmKey: 'infra-hub-spoke.tfstate'

    # Terraform Validate
    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'

